name: Refresh job dashboard

on:
  # No scheduled/daily run — refresh is MANUAL only (run from the Actions tab),
  # plus an auto-heal on upload so committing roles.json/pipeline.json re-verifies.
  workflow_dispatch: {}          # manual runs from the Actions tab
  push:
    branches: [main]
    paths:
      - "roles.json"             # auto-heal: a manual upload that clobbers the data
                                 # file instantly re-runs the bot, which re-merges
                                 # pipeline.json and re-verifies (clobber self-heals).
      - "pipeline.json"          # editing an application stage updates the live app
                                 # in seconds instead of waiting for the daily run.

permissions:
  contents: write                # let the default GITHUB_TOKEN commit the refreshed file

concurrency:
  group: refresh-dashboard
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    # Never re-trigger on the bot's own refresh commit. (Belt-and-suspenders:
    # pushes made with GITHUB_TOKEN already don't spawn new workflow runs, so
    # there is no infinite loop — this just makes that explicit.)
    if: "github.event_name != 'push' || !contains(github.event.head_commit.message, 'chore: daily refresh')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Verify, prune, and discover roles
        run: python3 verify.py

      - name: Commit refreshed dashboard
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "horizon-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add roles.json index.html
            git commit -m "chore: daily refresh — verify/prune/discover ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No role changes."
          fi
