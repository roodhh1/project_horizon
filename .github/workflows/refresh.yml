name: Refresh job dashboard

on:
  schedule:
    # GitHub cron is UTC and does not observe DST. 15:00 UTC = 08:00 PDT
    # (summer) / 07:00 PST (winter). Tuned to land at 8 AM Pacific.
    - cron: "0 15 * * *"     # daily 08:00 America/Los_Angeles (PDT)
  workflow_dispatch: {}       # allow manual runs from the Actions tab

permissions:
  contents: write             # let the default GITHUB_TOKEN commit the refreshed file

concurrency:
  group: refresh-dashboard
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Verify, prune, and discover roles
        run: python3 verify.py

      - name: Commit refreshed dashboard
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "horizon-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add roles.json index.html
            git commit -m "chore: daily refresh — verify/prune/discover ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No role changes today."
          fi
