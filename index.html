<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Beacon</title>
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Beacon">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<meta id="mc" name="theme-color" content="#fbfbfd">
<style>
  :root{
    --bg:#fbfbfd; --surface:#ffffff; --ink:#1d1d1f; --sub:#6e6e73; --faint:#86868b;
    --line:#e8e8ed; --line2:#f0f0f4; --accent:#0071e3; --accent-ink:#0060c0;
    --good:#1c8a4d; --teal:#1f8a8a; --warn:#bd7b12; --bad:#c0392b; --beacon:#f5a623;
    --chip:#f2f2f6;
    --shadow:0 1px 2px rgba(0,0,0,.04),0 8px 30px rgba(0,0,0,.06);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit}
  svg{display:block}
  .ic{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}

  /* Top nav */
  .topbar{position:sticky;top:0;z-index:50;background:rgba(251,251,253,.82);
    backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
    border-bottom:1px solid var(--line)}
  .topbar .inner{max-width:1040px;margin:0 auto;height:54px;display:flex;align-items:center;
    justify-content:space-between;padding:0 22px}
  .brand{display:flex;align-items:center;gap:9px;font-weight:600;font-size:18px;letter-spacing:-.02em;cursor:pointer}
  .brand .blogo{color:var(--beacon)}
  .nav{display:flex;gap:2px}
  .nav a{display:flex;align-items:center;gap:6px;color:var(--sub);font-size:13.5px;font-weight:500;
    padding:7px 12px;border-radius:980px;transition:background .15s,color .15s;cursor:pointer}
  .nav a .ic{width:17px;height:17px}
  .nav a:hover{color:var(--ink)}
  .nav a.on{color:var(--ink);background:#ececf0}
  @media(max-width:680px){ .nav a .lbl{display:none} .nav a{padding:8px} }

  .container{max-width:1040px;margin:0 auto;padding:36px 22px 80px}
  .view{animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  h1,h2,h3,h4{letter-spacing:-.022em;margin:0}
  .display{font-size:40px;font-weight:600;line-height:1.07}
  .lede{color:var(--sub);font-size:18px;margin-top:10px;font-weight:400}
  .meta-line{color:var(--faint);font-size:13px;margin-top:14px;display:flex;align-items:center;gap:7px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--good);display:inline-block}

  .sec-h{font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);margin:38px 2px 14px}

  /* Stat tiles */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:30px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px 18px}
  .stat .ic{width:22px;height:22px;color:var(--accent);margin-bottom:12px}
  .stat .n{font-size:30px;font-weight:600;letter-spacing:-.03em;line-height:1}
  .stat .l{color:var(--sub);font-size:12.5px;margin-top:5px}
  @media(max-width:680px){.stats{grid-template-columns:repeat(2,1fr)}}

  /* Nav tiles (hub) */
  .tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  .tile{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:22px;
    display:flex;align-items:flex-start;gap:16px;cursor:pointer;transition:transform .18s,box-shadow .18s;
    text-align:left;width:100%}
  .tile:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
  .tile .tic{flex-shrink:0;width:44px;height:44px;border-radius:13px;display:grid;place-items:center;
    background:#eef5ff;color:var(--accent)}
  .tile .tic .ic{width:23px;height:23px}
  .tile h3{font-size:17px;font-weight:600}
  .tile p{color:var(--sub);font-size:13.5px;margin:4px 0 0}
  .tile .arr{margin-left:auto;color:var(--faint);align-self:center}
  @media(max-width:680px){.tiles{grid-template-columns:1fr}}

  /* List rows */
  .list{background:var(--surface);border:1px solid var(--line);border-radius:18px;overflow:hidden}
  .row{display:flex;align-items:center;gap:14px;padding:15px 18px;cursor:pointer;
    border-top:1px solid var(--line2);transition:background .12s}
  .row:first-child{border-top:0}
  .row:hover{background:#f7f7fa}
  .mono{flex-shrink:0;width:42px;height:42px;border-radius:12px;display:grid;place-items:center;
    font-weight:600;font-size:16px;color:#fff;letter-spacing:-.02em}
  .row .mid{min-width:0;flex:1}
  .row .co{font-size:11.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--faint)}
  .row .rl{font-size:15px;font-weight:600;letter-spacing:-.01em;margin-top:1px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .sub{font-size:12.5px;color:var(--sub);margin-top:2px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .row .rt{display:flex;align-items:center;gap:12px;flex-shrink:0}
  .bmk{color:var(--accent)}
  .chev{color:#c5c5cc}

  .pill{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:980px}
  .pill.at{background:#e3f5ea;color:var(--good)} .pill.border{background:#fbf0db;color:var(--warn)}
  .pill.below{background:#f2f2f6;color:var(--sub)} .pill.tbd{background:#f2f2f6;color:var(--faint)}
  .tagchip{font-size:11px;font-weight:500;color:var(--sub);background:var(--chip);padding:2px 9px;border-radius:980px}
  .sbadge{font-size:11px;font-weight:600;padding:2px 9px;border-radius:980px;white-space:nowrap}
  .stage-head{display:flex;align-items:center;gap:9px;margin:26px 2px 12px}
  .stage-head .sdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .stage-head h3{font-size:15px;font-weight:600}
  .stage-head .cnt{color:var(--faint);font-size:13px;font-weight:500}
  .appnote{font-size:13.5px;color:var(--sub);margin-top:3px;line-height:1.45}

  /* Controls */
  .controls{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin:20px 0 16px}
  .seg{display:inline-flex;background:#ececf0;border-radius:11px;padding:3px}
  .seg button{border:0;background:transparent;font-size:13.5px;font-weight:500;color:var(--sub);
    padding:7px 16px;border-radius:9px;cursor:pointer}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .search{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);
    border-radius:11px;padding:8px 13px;flex:1;min-width:190px;color:var(--faint)}
  .search input{border:0;outline:0;font:inherit;font-size:14px;color:var(--ink);width:100%;background:transparent}
  .chiprow{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 16px}
  .fchip{font-size:13px;font-weight:500;color:var(--sub);background:var(--surface);border:1px solid var(--line);
    padding:6px 13px;border-radius:980px;cursor:pointer}
  .fchip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .countline{color:var(--faint);font-size:13px;margin:0 2px 14px}

  .ring text{font-family:inherit}

  /* Detail */
  .back{display:inline-flex;align-items:center;gap:4px;color:var(--accent);font-size:14px;font-weight:500;
    cursor:pointer;margin-bottom:22px}
  .back .ic{width:18px;height:18px}
  .dhead{display:flex;gap:18px;align-items:center}
  .dhead .mono{width:60px;height:60px;border-radius:16px;font-size:23px}
  .dhead .co{font-size:12.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--faint)}
  .dhead h1{font-size:26px;font-weight:600;margin-top:3px}
  .dhead .loc{color:var(--sub);font-size:14px;margin-top:5px}
  .dhead .rt{margin-left:auto;text-align:center;flex-shrink:0}
  .dhead .rt .lbl{font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);margin-top:2px}
  .dchips{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0 4px}
  .actions{display:flex;gap:10px;margin:22px 0 6px}
  .btn{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-size:14.5px;
    font-weight:500;padding:13px 18px;border-radius:13px;cursor:pointer;border:1px solid transparent}
  .btn .ic{width:18px;height:18px}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:var(--accent-ink)}
  .btn-ghost{background:var(--surface);border-color:var(--line);color:var(--ink)}
  .btn-ghost.on{background:#eef5ff;border-color:#bcd9fb;color:var(--accent-ink)}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:20px 22px;margin-top:14px}
  .panel-h{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;letter-spacing:.03em;
    text-transform:uppercase;color:var(--faint);margin-bottom:14px}
  .panel-h .ic{width:17px;height:17px;color:var(--faint)}
  .ptext{font-size:15px;color:var(--body);line-height:1.55}
  .mono{position:relative;overflow:hidden}
  .mono .logo{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#fff;padding:5px}
  .bars{display:grid;gap:11px}
  .bar{display:flex;align-items:center;gap:12px;font-size:13.5px}
  .bar .bl{width:96px;color:var(--sub);flex-shrink:0}
  .bar .bt{flex:1;height:6px;background:#ececf0;border-radius:4px;overflow:hidden}
  .bar .bt i{display:block;height:100%;border-radius:4px}
  .bar .bv{width:20px;text-align:right;font-weight:600}
  .conf{font-size:11px;font-weight:600;padding:3px 10px;border-radius:980px;margin-left:auto}
  .conf-high{background:#e3f5ea;color:var(--good)} .conf-med{background:#fbf0db;color:var(--warn)} .conf-low{background:#f2f2f6;color:var(--sub)}
  .kv{display:flex;justify-content:space-between;gap:12px;font-size:14.5px;padding:9px 0;border-top:1px solid var(--line2)}
  .kv:first-child{border-top:0} .kv .k{color:var(--sub)} .kv .v{font-weight:500;text-align:right}
  .reqline{font-size:13.5px;color:var(--sub);margin-top:14px;padding-top:14px;border-top:1px solid var(--line2);line-height:1.7}
  .reqline b{color:var(--ink);font-weight:600}
  .reftext{font-size:14px;color:var(--body);line-height:1.55;margin-top:10px}
  .reftext b{color:var(--ink)}
  .capt{font-size:12px;color:var(--faint);margin-top:12px;line-height:1.5}
  .capt b{color:var(--ink);font-weight:600}
  .reflevel{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:500}
  .lvl-dot{width:9px;height:9px;border-radius:50%}

  .empty{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:48px 20px;
    text-align:center;color:var(--sub);font-size:14.5px}
  .empty.illus{padding:54px 24px}
  .empty.illus svg{margin:0 auto 20px}
  .empty.illus h3{font-size:18px;font-weight:600;color:var(--ink);margin-bottom:7px}
  .empty.illus p{max-width:360px;margin:0 auto;font-size:14px;color:var(--sub);line-height:1.5}

  /* About */
  .feat{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  .fcard{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:22px}
  .fcard .tic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;background:#eef5ff;color:var(--accent);margin-bottom:14px}
  .fcard h3{font-size:16px;font-weight:600}
  .fcard p{color:var(--sub);font-size:13.5px;margin:6px 0 0;line-height:1.5}
  .lanes{display:grid;gap:10px;margin-top:6px}
  .lane{display:flex;gap:13px;align-items:flex-start;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px 18px}
  .lane .ic{color:var(--accent);flex-shrink:0;margin-top:1px}
  .lane h4{font-size:15px;font-weight:600}
  .lane p{margin:3px 0 0;font-size:13.5px;color:var(--sub)}
  .footer{color:var(--faint);font-size:12.5px;text-align:center;margin-top:46px;line-height:1.7}
  @media(max-width:680px){.feat{grid-template-columns:1fr}.display{font-size:32px}.lede{font-size:16px}}

  /* ---------- theme variables + iOS ---------- */
  *{-webkit-tap-highlight-color:transparent}
  :root{--track:#ececf0; --topbar:rgba(251,251,253,.82); --tint:#eef5ff; --hover:#f7f7fa; --seg:#ececf0; --body:#33333a}
  :root[data-theme="dark"]{
    --bg:#000000; --surface:#1c1c1e; --ink:#f5f5f7; --sub:#a1a1a6; --faint:#8e8e93;
    --line:#2c2c2e; --line2:#262628; --chip:#2c2c2e; --track:#3a3a3c;
    --topbar:rgba(0,0,0,.72); --tint:rgba(10,132,255,.18); --hover:#262628; --seg:#2c2c2e; --body:#d6d6db;
    --shadow:0 1px 2px rgba(0,0,0,.5),0 10px 30px rgba(0,0,0,.6);
  }
  .topbar{background:var(--topbar)}
  .tile .tic,.fcard .tic{background:var(--tint)}
  .btn-ghost.on{background:var(--tint)}
  .bar .bt{background:var(--track)}
  .seg{background:var(--seg)}
  .seg button.on{background:var(--surface)}
  .row:hover{background:var(--hover)}
  .nav a.on{background:var(--seg)}
  [data-theme="dark"] .pill.at,[data-theme="dark"] .conf-high{background:rgba(48,209,88,.18);color:#30d158}
  [data-theme="dark"] .pill.border,[data-theme="dark"] .conf-med{background:rgba(255,159,10,.2);color:#ff9f0a}
  [data-theme="dark"] .pill.below,[data-theme="dark"] .pill.tbd,[data-theme="dark"] .conf-low{background:#2c2c2e;color:#a1a1a6}
  [data-theme="dark"] .seg button.on{background:#48484a;color:#fff}

  .topright{display:flex;align-items:center;gap:8px}
  .themebtn{display:grid;place-items:center;width:34px;height:34px;border-radius:980px;border:1px solid var(--line);
    background:var(--surface);color:var(--sub);cursor:pointer}
  .themebtn:hover{color:var(--ink)}
  .themebtn .ic{width:18px;height:18px}

  /* filter + sort bar */
  .fbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:0 0 16px}
  .selwrap{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);
    border-radius:11px;padding:7px 11px;font-size:12.5px;color:var(--faint)}
  .selwrap select{border:0;outline:0;background:transparent;font:inherit;font-size:13px;color:var(--ink);cursor:pointer}

  /* iOS / mobile: bottom tab bar + safe areas */
  @media(max-width:680px){
    /* drop blur so the fixed bottom nav anchors to the viewport, not the topbar */
    .topbar{backdrop-filter:none;-webkit-backdrop-filter:none;background:var(--bg)}
    .topbar .inner{padding-left:max(18px,env(safe-area-inset-left));padding-right:max(14px,env(safe-area-inset-right))}
    .container{padding-left:max(18px,env(safe-area-inset-left));padding-right:max(18px,env(safe-area-inset-right));padding-bottom:118px}
    .nav{position:fixed;left:0;right:0;bottom:0;z-index:60;gap:0;justify-content:space-around;
      background:var(--topbar);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
      border-top:1px solid var(--line);padding:8px 6px calc(8px + env(safe-area-inset-bottom))}
    .nav a{flex-direction:column;gap:3px;padding:4px 12px;border-radius:12px;color:var(--faint);font-size:10px;font-weight:600}
    .nav a .ic{width:23px;height:23px}
    .nav a .lbl{display:block}
    .nav a.on{background:transparent;color:var(--accent)}
    .controls{gap:10px}.seg{flex:1}.seg button{flex:1}
  }
</style>
</head>
<body>
<div class="topbar">
  <div class="inner">
    <div class="brand" onclick="go('#/')">
      <svg class="ic blogo" viewBox="0 0 24 24" style="width:23px;height:23px"><g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M9 8.6a5 5 0 0 0 0 6.8"/><path d="M6.3 5.9a9 9 0 0 0 0 12.2"/><path d="M15 8.6a5 5 0 0 1 0 6.8"/><path d="M17.7 5.9a9 9 0 0 1 0 12.2"/></g><circle cx="12" cy="12" r="2.4" fill="currentColor" stroke="none"/></svg>
      Beacon
    </div>
    <div class="topright">
    <nav class="nav" id="nav">
      <a data-route="#/" onclick="go('#/')"><svg class="ic" viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9.5"/></svg><span class="lbl">Home</span></a>
      <a data-route="#/roles" onclick="go('#/roles')"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="4.2"/><circle cx="12" cy="12" r="1" fill="currentColor"/></svg><span class="lbl">Roles</span></a>
      <a data-route="#/pipeline" onclick="go('#/pipeline')"><svg class="ic" viewBox="0 0 24 24"><path d="M4 5h16l-6 7v6l-4 2v-8z"/></svg><span class="lbl">Pipeline</span></a>
      <a data-route="#/radar" onclick="go('#/radar')"><svg class="ic" viewBox="0 0 24 24"><path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1z"/></svg><span class="lbl">Radar</span></a>
      <a data-route="#/network" onclick="go('#/network')"><svg class="ic" viewBox="0 0 24 24"><circle cx="9" cy="8" r="3"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0"/><path d="M16 5.3a3 3 0 0 1 0 5.4"/><path d="M20.5 20a5.5 5.5 0 0 0-4.3-5.4"/></svg><span class="lbl">Network</span></a>
      <a data-route="#/about" onclick="go('#/about')"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 11v5"/><circle cx="12" cy="7.6" r=".7" fill="currentColor" stroke="none"/></svg><span class="lbl">About</span></a>
    </nav>
    </div>
  </div>
</div>

<main class="container" id="app"></main>

<script>
let ROLES=[], VERIFIED_ON="";

/* ---------- engaged state (per-device, persists across refreshes) ---------- */
const EKEY='beacon_engaged_v1';
let engagedMap={};
try{ engagedMap=JSON.parse(localStorage.getItem(EKEY)||'{}'); }catch(e){ engagedMap={}; }
const keyOf=r=>r.co+'|'+r.role;
// engagedMap value: 'YYYY-MM-DD' (engaged, with date) | true (engaged, legacy) | false (not). Missing => default to r.active.
const isEngaged=r=>{const v=engagedMap[keyOf(r)];return v===undefined?!!r.active:!!v;};
const engagedDate=r=>{const v=engagedMap[keyOf(r)];return (typeof v==='string')?v:null;};
function toggleEngaged(key){
  key=decodeURIComponent(key);
  const r=ROLES.find(x=>keyOf(x)===key);
  const cur=r?isEngaged(r):!!engagedMap[key];
  engagedMap[key]= cur ? false : new Date().toISOString().slice(0,10);  // record the date you engage
  try{ localStorage.setItem(EKEY,JSON.stringify(engagedMap)); }catch(e){}
  router();
}

/* ---------- helpers ---------- */
const ICON={
  bookmark:'<path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1z"/>',
  users:'<circle cx="9" cy="8" r="3"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0"/><path d="M16 5.3a3 3 0 0 1 0 5.4"/><path d="M20.5 20a5.5 5.5 0 0 0-4.3-5.4"/>',
  info:'<circle cx="12" cy="12" r="9"/><path d="M12 11v5"/><circle cx="12" cy="7.6" r=".7" fill="currentColor" stroke="none"/>',
  search:'<circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/>',
  chevR:'<path d="m9 6 6 6-6 6"/>', chevL:'<path d="m15 6-6 6 6 6"/>',
  target:'<circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="4.2"/><circle cx="12" cy="12" r="1" fill="currentColor"/>',
  ext:'<path d="M14 4h6v6"/><path d="M20 4 11 13"/><path d="M19 14v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h5"/>',
  check:'<path d="m5 12 5 5 9-11"/>',
  refresh:'<path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 3.5v4h-4"/>',

const DOMAINS={Mercury:'mercury.com',Anthropic:'anthropic.com',Gusto:'gusto.com',Chime:'chime.com',

function ring(score,size){

  return `<svg class="ring" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${C}" cy="${C}" r="${r}" fill="none" stroke="var(--track)" stroke-width="3.4"/>

}

let listMode='top', listTrack='', listQuery='', listComp='', listConf='', listSort='fit', listLane='ds', pipeLane='all';
const COMPRANK={at:0,border:1,below:2,null:3};
function filteredRoles(){
  const rows=ROLES.filter(r=>{
    // Pipeline-tracked roles live on the Pipeline tab; only surface "to apply" here.
    if(stageOf(r) && stageOf(r)!=='to-apply') return false;
    // Data Science vs Product (PM) lanes — DS is the default focus; PM lives behind its toggle.
    const isPM = r.track==='pm' || r.kind==='pm';
    if(listLane==='ds' && isPM) return false;
    if(listLane==='pm' && !isPM) return false;
    if(listTrack && r.track!==listTrack && r.extraTrack!==listTrack) return false;
    if(listComp && r.compFit!==listComp) return false;
    if(listConf && (r.fit||{}).confidence!==listConf) return false;
    if(listQuery && !(r.co+' '+r.role).toLowerCase().includes(listQuery.toLowerCase())) return false;
    return true;
  });
  const byScore=(a,b)=>(b.score??-1)-(a.score??-1);
  if(listSort==='comp') rows.sort((a,b)=>(COMPRANK[a.compFit]??9)-(COMPRANK[b.compFit]??9)||byScore(a,b));
  else if(listSort==='company') rows.sort((a,b)=>a.co.localeCompare(b.co)||byScore(a,b));
  else rows.sort(byScore);
  return rows;
}
const FVAL={comp:()=>listComp,conf:()=>listConf,sort:()=>listSort};
function setF(k,v){ if(k==='comp')listComp=v; else if(k==='conf')listConf=v; else listSort=v; rerenderList(); }
function sel(label,key,opts){
  const cur=FVAL[key]();
  return `<label class="selwrap">${label} <select onchange="setF('${key}',this.value)">${opts.map(([v,l])=>`<option value="${v}" ${cur===v?'selected':''}>${l}</option>`).join('')}</select></label>`;
}

  const lower=(listLane==='pm')?0:base.filter(r=>(r.score??0)<7).length;
  const tracks=[['','All'],['domain','Domain'],['lateral','Lateral'],['stepup','Step-up'],['stretch','Stretch']];

      <div class="fcard"><div class="tic">${icon('refresh')}</div><h3>Verified daily</h3><p>Every role is re-checked at 8 AM PT against the company's live job board. Closed roles are pruned; new ones are discovered automatically.</p></div>
      <div class="fcard"><div class="tic">${icon('gauge')}</div><h3>Scored for fit</h3><p>A weighted model — 35% relevance, 20% level, 20% experience match, 10% company, 15% comp — judged against your real profile and each JD.</p></div>
      <div class="fcard"><div class="tic">${icon('users')}</div><h3>Network-mapped</h3><p>Each role carries warm 1st/2nd-degree paths into the hiring team, refreshed on demand from your LinkedIn.</p></div>
      <div class="fcard"><div class="tic">${icon('bookmark')}</div><h3>Yours to steer</h3><p>Mark roles engaged to move them into your radar. Saved on your device — nothing leaves your machine.</p></div>
    </div>
    <div class="sec-h">The mobility framework</div>
    <div class="lanes">${lanes.map(([i,h,p])=>`<div class="lane">${icon(i)}<div><h4>${h}</h4><p>${p}</p></div></div>`).join('')}</div>
    <div class="footer">Comp ranges are base salary as posted; total comp adds equity + bonus. Re-verify before applying.</div>
  </div>`;
}

/* ---------- router ---------- */
function go(hash){ location.hash=hash; }
function router(){
  const h=location.hash||'#/';
  const app=document.getElementById('app');
  let html, active='#/';
  if(h.startsWith('#/role/')){ html=roleDetail(dec(h.slice(7))); active='#/roles'; }
  else if(h.startsWith('#/roles')){ html=rolesView(); active='#/roles'; }
  else if(h.startsWith('#/pipeline')){ html=pipelineView(); active='#/pipeline'; }
  else if(h.startsWith('#/radar')){ html=radarView(); active='#/radar'; }
  else if(h.startsWith('#/network')){ html=networkView(); active='#/network'; }
  else if(h.startsWith('#/about')){ html=aboutView(); active='#/about'; }
  else { html=homeView(); active='#/'; }
  app.innerHTML=html;
  document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('on',a.dataset.route===active));
  if(!h.startsWith('#/role/')) window.scrollTo(0,0);
}
window.addEventListener('hashchange',router);

/* ---------- theme ---------- */
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  try{ localStorage.setItem('beacon_theme',t); }catch(e){}
  const mc=document.getElementById('mc'); if(mc) mc.setAttribute('content', t==='dark'?'#000000':'#fbfbfd');
  const tb=document.getElementById('themebtn'); if(tb) tb.innerHTML=icon(t==='dark'?'sun':'moon');
}
function toggleTheme(){ applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'); }
applyTheme('light');  // dark mode disabled for now

fetch('roles.json',{cache:'no-store'})
  .then(r=>{if(!r.ok)throw new Error('roles.json '+r.status);return r.json();})
  .then(data=>{ VERIFIED_ON=data.verified_on||''; ROLES=(data.roles||[]).filter(r=>(r.status||{live:true}).live || r.pinned); router(); })
  .catch(e=>{ document.getElementById('app').innerHTML=`<div class="empty" style="color:#c0392b">Couldn't load roles.json (${e.message}). Serve over http (e.g. <code>python3 -m http.server</code>) — GitHub Pages works fine.</div>`; });
</script>
